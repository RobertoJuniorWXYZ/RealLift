name: Compile LaTeX Preprint

on:
  push:
    branches: [main]
    paths:
      - 'reallift_preprint.tex'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: reallift_preprint.tex

      - name: Commit updated PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: recompile preprint PDF"
          file_pattern: "reallift_preprint.pdf"
